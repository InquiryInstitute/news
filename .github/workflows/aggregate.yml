name: News Aggregation

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  aggregate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run aggregation
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GOTOSOCIAL_API_TOKEN: ${{ secrets.GOTOSOCIAL_API_TOKEN }}
          GOTOSOCIAL_URL: https://social.inquiry.institute
        run: |
          python aggregate.py
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'News Aggregator Bot'
          git config --global user.email 'bot@inquiryinstitute.org'
          git add news_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update news data - $(date -u)" && git push)
