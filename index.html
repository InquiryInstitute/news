<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry Institute News Aggregator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>📰 Inquiry Institute News</h1>
            <p class="tagline">Curated news and insights for critical thinking</p>
            <p id="last-updated" class="last-updated"></p>
        </div>
    </header>

    <main class="container">
        <div id="news-feed">
            <div class="loading">Loading news...</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Inquiry Institute. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
